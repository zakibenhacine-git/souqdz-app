<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — SOUQDZ.COM</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css?v=5">
</head>
<body>
<header class="main">
  <div class="header-row wrap">
    <a href="/" class="logo">SOUQ<span>DZ</span>.COM</a>
  </div>
</header>

<div class="form-page">
  <div class="form-card">
    <h1>Connexion</h1>
    <p class="sub">Accédez à votre compte et suivez vos commandes.</p>
    <div class="form-error" id="err"></div>
    <form id="loginForm">
      <div class="field">
        <label for="email">Adresse email</label>
        <input type="email" id="email" required autocomplete="email">
      </div>
      <div class="field">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-block">Se connecter</button>
    </form>
    <p class="switch-link">Pas encore de compte ? <a href="/register.html">Créer un compte</a></p>
  </div>
</div>

<script src="/js/common.js"></script>
<script>
  document.getElementById('loginForm').addEventListener('submit', async e=>{
    e.preventDefault();
    const err = document.getElementById('err');
    err.classList.remove('show');
    try{
      await api('/auth/login', {
        method: 'POST',
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
        })
      });
      location.href = '/account.html';
    }catch(ex){
      err.textContent = ex.message;
      err.classList.add('show');
    }
  });
</script>
</body>
</html>
