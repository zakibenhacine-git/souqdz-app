<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Espace admin — SOUQDZ.COM</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css?v=4">
</head>
<body style="background:var(--indigo-deep);">
<div class="form-page" style="min-height:100vh; align-items:center;">
  <div class="form-card">
    <span class="hero-eyebrow">Espace administrateur</span>
    <h1>SOUQ<span style="color:var(--rust);">DZ</span> Admin</h1>
    <p class="sub">Connectez-vous pour gérer produits et commandes.</p>
    <div class="form-error" id="err"></div>
    <form id="loginForm">
      <div class="field">
        <label for="email">Adresse email</label>
        <input type="email" id="email" required value="admin@souqdz.com">
      </div>
      <div class="field">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Se connecter</button>
    </form>
    <p class="switch-link" style="margin-top:16px;">Identifiants par défaut : admin@souqdz.com / admin123</p>
  </div>
</div>
<script src="/js/common.js"></script>
<script>
  document.getElementById('loginForm').addEventListener('submit', async e=>{
    e.preventDefault();
    const err = document.getElementById('err');
    err.classList.remove('show');
    try{
      const { user } = await api('/auth/login', {
        method: 'POST',
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
        })
      });
      if(user.role !== 'admin'){
        err.textContent = "Ce compte n'a pas les droits administrateur.";
        err.classList.add('show');
        await api('/auth/logout', { method: 'POST' });
        return;
      }
      location.href = '/admin/dashboard.html';
    }catch(ex){
      err.textContent = ex.message;
      err.classList.add('show');
    }
  });
</script>
</body>
</html>
